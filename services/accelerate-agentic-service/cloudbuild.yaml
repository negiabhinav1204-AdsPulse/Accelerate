steps:
  # Build the Docker image using kaniko (runs inside Cloud Build, no docker daemon needed)
  - name: 'gcr.io/kaniko-project/executor:latest'
    args:
      - '--dockerfile=Dockerfile'
      - '--context=dir://.'
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:${SHORT_SHA}'
      - '--destination=${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_SERVICE}:latest'
      - '--cache=true'
      - '--cache-ttl=24h'

substitutions:
  _REGION: asia-south1
  _REPO: accelerate-ai
  _SERVICE: accelerate-agentic-service

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: E2_HIGHCPU_8
